{% extends "base.html" %}


{% block title %}

Registro | Centro de Alumnos 

{% endblock %}





{% block content %}



<section class="auth-section">


<div class="container">


<div class="row justify-content-center">



<div class="col-md-6">



<div class="auth-card">



<div class="text-center mb-4">


<i class="fa-solid fa-user-plus fa-4x text-primary"></i>


<h2 class="mt-3">

Crear cuenta

</h2>


<p class="text-muted">

Únete a la comunidad estudiantil.

</p>


</div>





<form method="POST">





<div class="mb-3">


<label class="form-label">

Nombre completo

</label>


<div class="input-group">


<span class="input-group-text">

<i class="fa-solid fa-user"></i>

</span>


<input

type="text"

name="nombre"

class="form-control"

placeholder="Tu nombre"

required>


</div>


</div>







<div class="mb-3">


<label class="form-label">

Correo electrónico

</label>


<div class="input-group">


<span class="input-group-text">

<i class="fa-solid fa-envelope"></i>

</span>


<input

type="email"

name="correo"

class="form-control"

placeholder="correo@ejemplo.com"

required>


</div>


</div>







<div class="mb-3">


<label class="form-label">

Curso

</label>



<div class="input-group">


<span class="input-group-text">

<i class="fa-solid fa-school"></i>

</span>



<select

name="curso"

class="form-select"

required>


<option value="">

Selecciona tu curso

</option>
<option>
    
1° Básico
<option>

2° Básico
<option>

3° Básico
<option>

4° Básico
<option>

5° Básico
<option>

6° Básico
<option>

7° Básico
<option>

8° Básico


<option>

1° Medio

</option>


<option>

2° Medio

</option>


<option>

3° Medio

</option>


<option>

4° Medio

</option>


</select>


</div>


</div>







<div class="mb-3">


<label class="form-label">

Contraseña

</label>


<div class="input-group">


<span class="input-group-text">

<i class="fa-solid fa-lock"></i>

</span>


<input

type="password"

name="contraseña"

class="form-control"

placeholder="Crea una contraseña"

required>


</div>


</div>







<div class="mb-3">


<label class="form-label">

Confirmar contraseña

</label>


<div class="input-group">


<span class="input-group-text">

<i class="fa-solid fa-shield"></i>

</span>



<input

type="password"

name="confirmar"

class="form-control"

placeholder="Repite la contraseña"

required>


</div>


</div>








<div class="d-grid mt-4">


<button

class="btn btn-primary btn-lg">


<i class="fa-solid fa-user-check"></i>

Crear cuenta


</button>


</div>





</form>







<div class="text-center mt-4">


<p>

¿Ya tienes cuenta?

<a href="/login">

Inicia sesión

</a>

</p>


</div>






</div>


</div>


</div>


</div>


</section>



{% endblock %}
