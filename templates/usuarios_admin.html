{% extends "base.html" %}



{% block title %}
Usuarios
{% endblock %}




{% block content %}


<div class="container mt-5">


<h1>
👥 Usuarios registrados
</h1>


<table class="table table-dark table-striped mt-4">


<tr>

<th>
Nombre
</th>

<th>
Correo
</th>

<th>
Curso
</th>

<th>
Rol
</th>

</tr>




{% for usuario in usuarios %}


<tr>


<td>
{{ usuario.nombre }}
</td>


<td>
{{ usuario.correo }}
</td>


<td>
{{ usuario.curso }}
</td>


<td>
{{ usuario.rol }}
</td>



</tr>


{% endfor %}



</table>


</div>


{% endblock %}
